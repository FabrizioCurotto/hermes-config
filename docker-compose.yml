# ──────────────────────────────────────────────────────────────────────────────
# Hermes Agent — Docker Compose
# Gateway + Dashboard + Docker-out-of-Docker (DooD)
# ──────────────────────────────────────────────────────────────────────────────

services:
  # ── Gateway: El agente ───────────────────────────────────────────────────────
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    ports:
      - "8642:8642"         # API server OpenAI-compatible
    volumes:
      # ── Datos persistentes del usuario ──────────────────────────────────────
      - ~/.hermes:/opt/data

      # ── Docker-out-of-Docker (DooD) ──────────────────────────────────────────
      # Monta el socket de Docker del HOST para que el contenedor pueda:
      #   - docker build   → construir imágenes
      #   - docker run     → ejecutar contenedores
      #   - docker-compose → orquestar servicios
      - /var/run/docker.sock:/var/run/docker.sock

    networks:
      - hermes-net

    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

    # Descomenta y-edita para pasar API keys por env (en lugar de .env):
    # environment:
    #   - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    #   - OPENAI_API_KEY=${OPENAI_API_KEY}

  # ── Dashboard: Interfaz web ─────────────────────────────────────────────────
  hermes-dashboard:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-dashboard
    restart: unless-stopped
    command: dashboard --host 0.0.0.0
    ports:
      - "9119:9119"
    volumes:
      - ~/.hermes:/opt/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - GATEWAY_HEALTH_URL=http://hermes:8642
      - GATEWAY_HEALTH_TIMEOUT=3
    networks:
      - hermes-net
    depends_on:
      - hermes
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

networks:
  hermes-net:
    driver: bridge
