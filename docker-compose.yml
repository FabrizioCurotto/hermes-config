# ──────────────────────────────────────────────────────────────────────────────
# Hermes Agent — Docker Compose
# Imagen oficial + Docker-out-of-Docker (DooD) + host docker group access
# ──────────────────────────────────────────────────────────────────────────────

services:
  # ── Gateway: El agente ───────────────────────────────────────────────────────
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    ports:
      - "8642:8642"                      # API server OpenAI-compatible
    volumes:
      # ── Bind mount: apunta a tu ~/.hermes existente ────────────────────────
      - hermes-data:/opt/data

      # ── Docker-out-of-Docker (DooD) ────────────────────────────────────────
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "988"                            # Host docker group GID
    networks:
      - hermes-net

    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  # ── Dashboard: Interfaz web ─────────────────────────────────────────────────
  hermes-dashboard:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-dashboard
    restart: unless-stopped
    command: dashboard --host 0.0.0.0 --insecure
    ports:
      - "9119:9119"
    volumes:
      - hermes-data:/opt/data
    environment:
      - GATEWAY_HEALTH_URL=http://hermes:8642
      - GATEWAY_HEALTH_TIMEOUT=3
    group_add:
      - "988"                            # Host docker group GID
    networks:
      - hermes-net
    depends_on:
      - hermes
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

volumes:
  hermes-data:
    external: true
    name: data_hermes-data

# ── Red compartida ─────────────────────────────────────────────────────────────
networks:
  hermes-net:
    driver: bridge

